name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish-libraries:
    name: Publish Libraries & Plugin
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.NEXUS_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.NEXUS_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_PRIVATE_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-daemon --no-configuration-cache --stacktrace

      - name: Publish Gradle Plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew :compose-buddy-gradle-plugin:publishPlugins --no-configuration-cache --stacktrace

  release-cli:
    name: Release CLI Binary
    runs-on: macos-latest
    timeout-minutes: 45
    needs: publish-libraries
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Build CLI binary
        run: ./gradlew :compose-buddy-cli:assemble --stacktrace

      - name: Package CLI binary
        id: package
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ZIP_NAME="compose-buddy-cli-${VERSION}.zip"
          STAGE_DIR="$(mktemp -d)"
          cp compose-buddy-cli/build/compose-buddy "${STAGE_DIR}/compose-buddy"
          chmod +x "${STAGE_DIR}/compose-buddy"
          (cd "${STAGE_DIR}" && zip -9 "${GITHUB_WORKSPACE}/${ZIP_NAME}" compose-buddy)
          SHA=$(shasum -a 256 "${ZIP_NAME}" | awk '{print $1}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@40a47be11b7cfb7cb21aa6387f78c10522a96c93 # v5.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: ${{ steps.package.outputs.zip }}
          tag_name: ${{ steps.package.outputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}

      - name: Dispatch Homebrew Tap update
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: mikepenz/homebrew-tap
          event-type: update-compose-buddy
          client-payload: |
            {
              "formula": "compose-buddy",
              "version": "${{ steps.package.outputs.version }}",
              "sha": "${{ steps.package.outputs.sha }}"
            }
